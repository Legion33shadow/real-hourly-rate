<script>

function showProj(mo){
  if(!mo||mo<=0){document.getElementById('proj').style.display='none';return;}
  var rows=[3,5,10]; var html='';
  for(var i=0;i<rows.length;i++){
    var y=rows[i];
    var cost=Math.round(mo*12*y);
    var gain=Math.round(cost*Math.pow(1.07,y));
    var delta=Math.round(gain-cost);
    html+='<div class="proj-row">'
      +'<span class="proj-year">'+y+' ans</span>'
      +'<span class="proj-cost">-'+cost.toLocaleString()+'</span>'
      +'<span class="proj-gain">+'+gain.toLocaleString()+' si investi</span>'
      +'<span class="proj-note">(+'+delta.toLocaleString()+'  interets)</span>'
      +'</div>';
  }
  document.getElementById('proj-body').innerHTML=html;
  document.getElementById('proj').style.display='block';
}
function shareTwitter(txt){

function calcRHR(){var sal=+document.getElementById('sal').value||0;var hrs=+document.getElementById('hrs').value||40;var costs=(+document.getElementById('tr').value||0)+(+document.getElementById('rp').value||0)+(+document.getElementById('vet').value||0)+(+document.getElementById('aut').value||0);var netSal=sal-costs;var hmo=hrs*4.33;var app=sal/hmo; var real=netSal/hmo;var loss=(app-real)/app*100;document.getElementById('sv_rhr').textContent=real.toFixed(2)+'€/h';document.getElementById('ss_rhr').textContent=real<8?'Salaire tres bas':real<12?'Salaire sous-evalue':'Taux correct';var bx=document.getElementById('shock-box');bx.className='shock-box '+(real<8?'shock-red':real<12?'shock-orange':'shock-green');document.getElementById('st_app').textContent=app.toFixed(2)+'€/h';document.getElementById('st_real').textContent=real.toFixed(2)+'€/h';document.getElementById('st_cost').textContent=Math.round(costs)+'€/mo';document.getElementById('st_pct').textContent=loss.toFixed(0)+'%';document.getElementById('shock-zone').style.display='block';}
